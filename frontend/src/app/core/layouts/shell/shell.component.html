<div class="shell">
  <aside class="sidebar">

    <div class="brand">
      <lucide-icon [img]="Building2" class="brand-icon" />
      <span class="brand-name">{{ brand() }}</span>
    </div>

    <nav class="nav">
      @for (item of navItems(); track item.path) {
        <a [routerLink]="item.path" routerLinkActive="active" class="nav-item">
          <lucide-icon [img]="item.icon" class="nav-icon" />
          <span class="nav-label">{{ item.label }}</span>
          @if (item.label === 'Notifications' && unreadCount() > 0) {
            <span class="unread-badge">{{ unreadCount() > 99 ? '99+' : unreadCount() }}</span>
          }
        </a>
      }
    </nav>

    <div class="sidebar-footer">
      <div class="user-card">
        <div class="avatar">{{ userInitials() }}</div>
        <div class="user-info">
          <div class="user-name">{{ userLabel() }}</div>
          @if (roleLabel()) {
            <div class="user-role">{{ roleLabel() }}</div>
          }
        </div>
      </div>
      <button type="button" class="logout-btn" title="Sign out" (click)="logout()">
        <lucide-icon [img]="LogOut" class="logout-icon" />
      </button>
    </div>

  </aside>

  <main class="content">
    <router-outlet />
  </main>
</div>
